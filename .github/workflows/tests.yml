name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nmt:
    name: nmt module tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Build all nmt tests
        run: nix build --no-link --print-build-logs '.#legacyPackages.x86_64-linux.test-all'
