name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nmt:
    name: nmt module tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Run nmt tests
        run: python3 tests/tests.py
