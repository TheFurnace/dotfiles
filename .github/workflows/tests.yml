name: Tests

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  skip-check:
    name: skip duplicate runs
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - id: skip
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'

  changes:
    name: detect changed paths
    needs: skip-check
    if: needs.skip-check.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      nmt: ${{ steps.filter.outputs.nmt }}
      installer: ${{ steps.filter.outputs.installer }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            nmt:
              - 'flake.nix'
              - 'flake.lock'
              - '.flake-modules/**'
              - '.config/**'
              - 'tests/*.py'
              - 'tests/modules/**'
              - 'tests/default.nix'
              - 'tests/package.nix'
            installer:
              - 'flake.nix'
              - 'flake.lock'
              - '.flake-modules/installer.nix'
              - 'tests/integration/**'
              - 'setup.sh'

  nmt:
    name: nmt module tests
    needs: [skip-check, changes]
    if: needs.skip-check.outputs.should_skip != 'true' && needs.changes.outputs.nmt == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Run nmt tests
        run: python3 tests/tests.py

  installer-bootstrap:
    name: installer bootstrap VM test
    needs: [skip-check, changes]
    if: needs.skip-check.outputs.should_skip != 'true' && needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm

      - name: Enable KVM access for the runner
        # GitHub-hosted ubuntu-latest runners expose /dev/kvm but the device
        # node isn't world-accessible by default. Loosen permissions so the
        # nix-daemon's build user can open it when launching the VM.
        run: |
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm
          sudo chmod 666 /dev/kvm

      - name: Build installer-bootstrap VM test
        run: nix build --print-build-logs .#checks.x86_64-linux.installer-bootstrap
