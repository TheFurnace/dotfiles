name: PR Validations

on:
  pull_request:

jobs:
  validations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run flake check and dotfiles validations
        run: |
          nix --quiet flake check
          nix --quiet develop .#default --command validate-dotfiles-config
