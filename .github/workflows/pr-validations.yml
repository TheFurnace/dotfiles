name: PR Validations

on:
  pull_request:

jobs:
  validations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
      - name: Run unit validations
        run: ./.github/scripts/run-unit-validations.sh
