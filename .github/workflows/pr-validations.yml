name: PR Validations

on:
  pull_request:

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Run nix flake check
        run: nix flake check

  dotfiles-validations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Run dotfiles validations
        run: nix develop .#default --command validate-dotfiles-config
