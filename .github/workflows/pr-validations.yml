name: PR Validations

on:
  pull_request:

jobs:
  validations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: core.progress
      GIT_CONFIG_VALUE_0: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run flake check and dotfiles validations
        run: |
          nix --log-format raw flake check
          nix --log-format raw develop .#default --command validate-dotfiles-config
