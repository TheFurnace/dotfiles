name: Flake Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
      - name: Update flake inputs
        run: nix flake update
      - name: Validate updated flake
        run: nix flake check
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake.lock"
          body: |
            Automated `nix flake update` run.

            - Updated `flake.lock`
            - Verified the result with `nix flake check`
          branch: automation/nix-flake-update
          delete-branch: true
