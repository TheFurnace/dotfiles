name: Nspawn User Flow

on:
  pull_request:
  workflow_dispatch:

jobs:
  user-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
      - name: Install systemd-nspawn dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap systemd-container
      - name: Run full user flow in systemd-nspawn
        run: bash ./.github/scripts/run-nspawn-user-flow.sh
