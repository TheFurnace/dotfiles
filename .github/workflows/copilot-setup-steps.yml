name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: core.progress
      GIT_CONFIG_VALUE_0: "false"
      GIT_TERMINAL_PROMPT: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Initialize dev shell
        run: nix --log-format raw develop .#default --command bash -lc 'command -v fish nvim oh-my-posh kitty pwsh validate-dotfiles-config'
