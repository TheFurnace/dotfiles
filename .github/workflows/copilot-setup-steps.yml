name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Initialize dev shell
        run: nix --quiet develop .#default --command bash -lc 'command -v fish nvim oh-my-posh kitty pwsh validate-dotfiles-config'
