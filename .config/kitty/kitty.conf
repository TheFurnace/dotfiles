include dracula.conf

# Use Fira Code as the font
font_family Fira Code

# Strip trailing spaces/newlines from selections (applies to all copy actions)
strip_trailing_spaces always

# Windows Terminal-style right-click:
#   selection present → copy to clipboard
#   no selection      → paste from clipboard
mouse_map right press ungrabbed kitten copy_or_paste.py

# Paste from clipboard with Ctrl+V
map ctrl+v paste_from_clipboard

# Default initial layout: tall (master on the left)
enabled_layouts tall,fat,horizontal,vertical,grid

# Split to a new pane in the same cwd with Ctrl+Shift+Enter
# Opens a new split in the current working directory of the active window
map ctrl+shift+enter launch --cwd=current

# moves the window into a new tab
map ctrl+f3 detach_window new-tab

